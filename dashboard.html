<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CopyTrade Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c22;
    --border: #1e2530;
    --border2: #252d38;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff4d6d;
    --red-dim: #ff4d6d22;
    --amber: #ffb700;
    --amber-dim: #ffb70022;
    --blue: #4fc3f7;
    --blue-dim: #4fc3f722;
    --text: #e8ecf0;
    --text2: #7a8694;
    --text3: #3d4a57;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    pointer-events:none;
    z-index:999;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--amber);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border2);
    font-size: 12px;
    color: var(--text2);
    transition: all .3s;
  }
  .status-pill.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
  }
  .status-pill.active .status-dot {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 4px var(--green); }
    50% { box-shadow: 0 0 14px var(--green); }
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    height: calc(100vh - 73px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* Config inputs */
  .field {
    margin-bottom: 12px;
  }
  .field label {
    font-size: 11px;
    color: var(--text2);
    display: block;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--amber); }

  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 7px;
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--amber);
    color: #000;
  }
  .btn-primary:hover { background: #ffc929; transform: translateY(-1px); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
  }
  .btn-danger:hover { background: var(--red-dim); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
    margin-top: 8px;
  }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-green {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
  }
  .btn-green:hover { background: var(--green-dim); }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .stat {
    background: var(--surface);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-val {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--font-display);
    color: var(--amber);
  }
  .stat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 3px;
  }

  /* Main content */
  .main {
    overflow-y: auto;
    padding: 24px 28px;
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .main-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 7px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Position cards */
  .positions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .pos-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all .25s;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }
  .pos-card:hover { border-color: var(--border); transform: translateY(-2px); }
  .pos-card::before {
    content:'';
    position:absolute;
    left:0; top:0; bottom:0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .pos-card.long::before { background: var(--green); }
  .pos-card.short::before { background: var(--red); }

  .pos-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .pos-symbol {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
  }
  .pos-badge {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .pos-badge.long { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .pos-badge.short { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }

  .pos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .pos-field label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 3px;
  }
  .pos-field .val {
    font-size: 14px;
    color: var(--text);
  }
  .pos-pnl {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pos-pnl.profit { background: var(--green-dim); }
  .pos-pnl.loss { background: var(--red-dim); }
  .pos-pnl label { font-size: 11px; color: var(--text2); }
  .pos-pnl .pnl-val {
    font-size: 18px;
    font-family: var(--font-display);
    font-weight: 800;
  }
  .pos-pnl.profit .pnl-val { color: var(--green); }
  .pos-pnl.loss .pnl-val { color: var(--red); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 14px; line-height: 1.8; }

  /* Log */
  .log-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    height: 160px;
    overflow-y: auto;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
  }
  .log-entry { margin-bottom: 4px; }
  .log-entry .ts { color: var(--text3); margin-right: 8px; }
  .log-entry.info .msg { color: var(--text2); }
  .log-entry.success .msg { color: var(--green); }
  .log-entry.error .msg { color: var(--red); }
  .log-entry.warn .msg { color: var(--amber); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <div class="logo-text">CopyTrade Monitor</div>
      <div class="logo-sub">Binance Futures → Telegram</div>
    </div>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Tidak aktif</span>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Stats -->
    <div>
      <div class="section-label">Ringkasan</div>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-val" id="statPos">0</div>
          <div class="stat-label">Posisi</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statPnl">$0</div>
          <div class="stat-label">Total PnL</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statLong">0</div>
          <div class="stat-label">Long/Short</div>
        </div>
      </div>
    </div>

    <!-- Control -->
    <div>
      <div class="section-label">Kontrol Monitor</div>
      <button class="btn btn-primary" id="btnStart" onclick="startMonitor()">▶ Mulai Monitor</button>
      <button class="btn btn-danger" id="btnStop" onclick="stopMonitor()" style="margin-top:8px;display:none">⏹ Hentikan</button>
    </div>

    <div class="divider"></div>

    <!-- Config -->
    <div>
      <div class="section-label">Konfigurasi</div>
      <div class="field">
        <label>Binance API Key</label>
        <input type="password" id="cfgApiKey" placeholder="Masukkan API Key...">
      </div>
      <div class="field">
        <label>Binance Secret Key</label>
        <input type="password" id="cfgSecret" placeholder="Masukkan Secret Key...">
      </div>
      <div class="field">
        <label>Telegram Bot Token</label>
        <input type="password" id="cfgTgToken" placeholder="123456:ABC-...">
      </div>
      <div class="field">
        <label>Telegram Chat ID</label>
        <input type="text" id="cfgChatId" placeholder="-100123456789">
      </div>
      <div class="field">
        <label>Interval Polling (detik)</label>
        <input type="number" id="cfgInterval" value="15" min="5" max="300">
      </div>
      <button class="btn btn-ghost" onclick="saveConfig()">💾 Simpan Konfigurasi</button>
      <button class="btn btn-green" onclick="testTelegram()" style="margin-top:8px">📨 Test Telegram</button>
    </div>

    <div class="divider"></div>

    <!-- Log -->
    <div style="flex:1">
      <div class="section-label">Activity Log</div>
      <div class="log-area" id="logArea"></div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <div class="main-title">Posisi Aktif</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadPositions()">
        <span id="refreshIcon">↻</span> Refresh
      </button>
    </div>
    <div class="positions-grid" id="posGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📭</div>
        <div class="empty-text">
          Tidak ada posisi aktif saat ini.<br>
          Pastikan server Python berjalan dan konfigurasi sudah diisi.
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let autoRefreshTimer = null;

function log(msg, type='info') {
  const area = document.getElementById('logArea');
  const ts = new Date().toLocaleTimeString('id-ID');
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  area.prepend(el);
  // Hapus log lama
  while(area.children.length > 50) area.removeChild(area.lastChild);
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = `toast ${type}`, 3000);
}

async function api(path, method='GET', body=null) {
  try {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if(body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    return await r.json();
  } catch(e) {
    log('Server tidak terhubung. Jalankan server.py!', 'error');
    return null;
  }
}

function formatPnl(val) {
  const n = parseFloat(val);
  return (n >= 0 ? '+' : '') + '$' + n.toFixed(2);
}

function renderPositions(positions) {
  const grid = document.getElementById('posGrid');

  if(!positions || positions.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Tidak ada posisi aktif saat ini.</div>
      </div>`;
    document.getElementById('statPos').textContent = '0';
    document.getElementById('statPnl').textContent = '$0';
    document.getElementById('statLong').textContent = '0/0';
    return;
  }

  let totalPnl = 0, longs = 0, shorts = 0;
  let html = '';

  positions.forEach(p => {
    const amt = parseFloat(p.positionAmt);
    const isLong = amt > 0;
    const pnl = parseFloat(p.unrealizedProfit || 0);
    totalPnl += pnl;
    if(isLong) longs++; else shorts++;

    const side = isLong ? 'long' : 'short';
    const sideLabel = isLong ? 'LONG' : 'SHORT';
    const pnlClass = pnl >= 0 ? 'profit' : 'loss';
    const entry = parseFloat(p.entryPrice).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:6});
    const markP = parseFloat(p.markPrice || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:6});
    const lev = p.leverage || '?';
    const roe = p.initialMargin > 0 ? ((pnl / parseFloat(p.initialMargin)) * 100).toFixed(2) : '—';

    html += `
    <div class="pos-card ${side}">
      <div class="pos-header">
        <div class="pos-symbol">${p.symbol}</div>
        <div class="pos-badge ${side}">${sideLabel}</div>
      </div>
      <div class="pos-grid">
        <div class="pos-field">
          <label>Entry Price</label>
          <div class="val">$${entry}</div>
        </div>
        <div class="pos-field">
          <label>Mark Price</label>
          <div class="val">$${markP}</div>
        </div>
        <div class="pos-field">
          <label>Size</label>
          <div class="val">${Math.abs(amt)}</div>
        </div>
        <div class="pos-field">
          <label>Leverage</label>
          <div class="val">${lev}x</div>
        </div>
      </div>
      <div class="pos-pnl ${pnlClass}">
        <label>Unrealized PnL</label>
        <div class="pnl-val">${formatPnl(pnl)}</div>
      </div>
    </div>`;
  });

  grid.innerHTML = html;
  document.getElementById('statPos').textContent = positions.length;
  document.getElementById('statPnl').textContent = (totalPnl >= 0 ? '+' : '') + '$' + Math.abs(totalPnl).toFixed(2);
  document.getElementById('statLong').textContent = `${longs}/${shorts}`;
}

async function loadPositions() {
  const icon = document.getElementById('refreshIcon');
  icon.className = 'spin';
  log('Mengambil data posisi...', 'info');
  const data = await api('/positions');
  icon.className = '';
  if(data && data.success) {
    renderPositions(data.positions);
    log(`${data.positions.length} posisi ditemukan`, 'success');
  } else {
    log('Gagal mengambil posisi: ' + (data?.error || 'koneksi gagal'), 'error');
  }
}

async function checkStatus() {
  const data = await api('/status');
  if(!data) return;
  const pill = document.getElementById('statusPill');
  const txt = document.getElementById('statusText');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  if(data.active) {
    pill.className = 'status-pill active';
    txt.textContent = 'Monitor Aktif';
    btnStart.style.display = 'none';
    btnStop.style.display = 'block';
  } else {
    pill.className = 'status-pill';
    txt.textContent = 'Tidak aktif';
    btnStart.style.display = 'block';
    btnStop.style.display = 'none';
  }
  renderPositions(data.positions);
}

async function startMonitor() {
  const data = await api('/monitor/start', 'POST');
  if(data?.success) {
    toast('Monitor dimulai! Notifikasi akan dikirim ke Telegram.', 'success');
    log('Monitor dimulai ✓', 'success');
    checkStatus();
    startAutoRefresh();
  } else {
    toast(data?.message || 'Gagal memulai', 'error');
  }
}

async function stopMonitor() {
  const data = await api('/monitor/stop', 'POST');
  if(data?.success) {
    toast('Monitor dihentikan.', 'success');
    log('Monitor dihentikan', 'warn');
    checkStatus();
    stopAutoRefresh();
  }
}

async function saveConfig() {
  const cfg = {
    binance_api_key: document.getElementById('cfgApiKey').value,
    binance_secret:  document.getElementById('cfgSecret').value,
    telegram_token:  document.getElementById('cfgTgToken').value,
    telegram_chat_id:document.getElementById('cfgChatId').value,
    poll_interval:   parseInt(document.getElementById('cfgInterval').value)
  };
  // Filter kosong
  Object.keys(cfg).forEach(k => { if(!cfg[k]) delete cfg[k]; });
  const data = await api('/config', 'POST', cfg);
  if(data?.success) {
    toast('Konfigurasi disimpan!', 'success');
    log('Config diperbarui', 'success');
  } else {
    toast('Gagal simpan config', 'error');
  }
}

async function testTelegram() {
  log('Mengirim test ke Telegram...', 'info');
  const data = await api('/test/telegram', 'POST');
  if(data?.success) {
    toast('✅ ' + data.message, 'success');
    log('Test Telegram berhasil!', 'success');
  } else {
    toast('❌ ' + (data?.message || 'Gagal'), 'error');
    log('Test Telegram gagal: ' + data?.message, 'error');
  }
}

function startAutoRefresh() {
  if(autoRefreshTimer) return;
  autoRefreshTimer = setInterval(checkStatus, 10000);
}

function stopAutoRefresh() {
  clearInterval(autoRefreshTimer);
  autoRefreshTimer = null;
}

// Init
log('Dashboard siap. Isi konfigurasi dan tekan Mulai Monitor.', 'info');
checkStatus();
setInterval(checkStatus, 10000);
</script>
</body>
</html>
